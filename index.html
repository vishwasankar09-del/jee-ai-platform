<!DOCTYPE html>
<html>
<head>
  <title>JEE AI Mock Test Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🔥 JEE AI Mock Test Generator</h1>

<select id="subject">
  <option>Mathematics</option>
  <option>Physics</option>
  <option>Chemistry</option>
</select>

<input id="chapter" placeholder="Chapter">
<input id="topic" placeholder="Topic">

<select id="difficulty">
  <option>JEE Main</option>
  <option>JEE Advanced</option>
</select>

<input id="n" type="number" value="10">

<button onclick="generateTest()">Generate Test</button>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
