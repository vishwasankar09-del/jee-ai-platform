<!DOCTYPE html>
<html>
<head>
  <title>JEE AI Mock Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>JEE AI Mock Test Platform</h1>

<div id="setup">
  <input id="rank" type="number" placeholder="Enter Target Rank">
  <button onclick="generateTest()">Generate Test</button>
</div>

<div id="test" class="hidden">
  <h3 id="qno"></h3>
  <p id="question"></p>

  <button id="opt0" onclick="selectOption(0)"></button>
  <button id="opt1" onclick="selectOption(1)"></button>
  <button id="opt2" onclick="selectOption(2)"></button>
  <button id="opt3" onclick="selectOption(3)"></button>
</div>

<div id="result" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
