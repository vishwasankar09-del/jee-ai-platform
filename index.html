<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JEE AI Mock Test Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚀 JEE AI Mock Test Platform</h1>

  <div id="setup">
    <input id="rank" type="number" placeholder="Enter Target Rank">

    <select id="subject">
      <option value="physics">Physics</option>
      <option value="chemistry">Chemistry</option>
      <option value="maths">Mathematics</option>
    </select>

    <button onclick="generateTest()">Generate Mock Test</button>
  </div>

  <div id="test" class="hidden">
    <h2 id="qno"></h2>
    <p id="question"></p>

    <div class="options">
      <button onclick="selectOption(0)" id="opt0"></button>
      <button onclick="selectOption(1)" id="opt1"></button>
      <button onclick="selectOption(2)" id="opt2"></button>
      <button onclick="selectOption(3)" id="opt3"></button>
    </div>

    <div class="nav">
      <button onclick="prevQ()">Previous</button>
      <button onclick="nextQ()">Next</button>
      <button onclick="submitTest()">Submit</button>
    </div>
  </div>

  <div id="result" class="hidden"></div>

</div>

<script src="script.js"></script>
</body>
</html>
